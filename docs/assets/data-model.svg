<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <rect width="1400" height="760" fill="#fffafc"/>
  <text x="700" y="55" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#880e4f">データ構造 / Data Model</text>
  <defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto"><path d="M0,0 L0,6 L10,3 z" fill="#ad1457"/></marker></defs>
  <g font-family="Arial" font-size="15">
    <rect x="555" y="110" width="290" height="120" rx="16" fill="#fce4ec" stroke="#ad1457" stroke-width="3"/>
    <text x="700" y="145" text-anchor="middle" font-size="20" font-weight="700">PurchasePlan</text><text x="700" y="175" text-anchor="middle">region / currency / references</text><text x="700" y="202" text-anchor="middle">products + recipients + allocations</text>
    <rect x="90" y="330" width="295" height="145" rx="16" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <text x="238" y="365" text-anchor="middle" font-size="20" font-weight="700">ProductItem</text><text x="238" y="395" text-anchor="middle">asin</text><text x="238" y="420" text-anchor="middle">buying_option_identifier</text><text x="238" y="445" text-anchor="middle">quantity / max price</text>
    <rect x="410" y="330" width="295" height="145" rx="16" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
    <text x="558" y="365" text-anchor="middle" font-size="20" font-weight="700">RecipientProfile</text><text x="558" y="395" text-anchor="middle">name / phone</text><text x="558" y="420" text-anchor="middle">postal / address lines</text><text x="558" y="445" text-anchor="middle">external_address_id</text>
    <rect x="730" y="330" width="295" height="145" rx="16" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
    <text x="878" y="365" text-anchor="middle" font-size="20" font-weight="700">Allocation</text><text x="878" y="395" text-anchor="middle">product_name</text><text x="878" y="420" text-anchor="middle">recipient_label</text><text x="878" y="445" text-anchor="middle">quantity</text>
    <rect x="1050" y="330" width="295" height="145" rx="16" fill="#ede7f6" stroke="#5e35b1" stroke-width="3"/>
    <text x="1198" y="365" text-anchor="middle" font-size="20" font-weight="700">API Payloads</text><text x="1198" y="395" text-anchor="middle">Cart addItems</text><text x="1198" y="420" text-anchor="middle">Ordering lineItems</text><text x="1198" y="445" text-anchor="middle">attributes / expectations</text>
    <line x1="650" y1="230" x2="238" y2="330" stroke="#ad1457" stroke-width="4" marker-end="url(#a)"/>
    <line x1="685" y1="230" x2="558" y2="330" stroke="#ad1457" stroke-width="4" marker-end="url(#a)"/>
    <line x1="730" y1="230" x2="878" y2="330" stroke="#ad1457" stroke-width="4" marker-end="url(#a)"/>
    <line x1="805" y1="230" x2="1198" y2="330" stroke="#ad1457" stroke-width="4" marker-end="url(#a)"/>
    <rect x="185" y="590" width="1030" height="80" rx="16" fill="#ffffff" stroke="#f8bbd0" stroke-width="2"/>
    <text x="700" y="625" text-anchor="middle" font-size="20" font-weight="700">顧客ごとにRecipientProfileを切り替え、Allocationで数量を分配します。</text>
    <text x="700" y="653" text-anchor="middle" font-size="18">Switch RecipientProfile per customer and split quantities with Allocation.</text>
  </g>
